plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.7'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.mindex'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = '17'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
    // Enhancement: Added spring-boot-starter-validation dependency to support
    // @Valid, @NotNull, @Positive, @NotBlank annotations for request validation.
    // This allows us to validate Compensation input at the controller level
    // and return HTTP 400 Bad Request for invalid data.
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'de.bwaldvogel:mongo-java-server:1.44.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'junit:junit:4.13.1'
}
